<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aries 八字分析</title>
<link rel="icon" href="assets/logo.png">
<link rel="stylesheet" href="css/style.css?v=22">
</head>
<body>

<header class="site-header">
  <div class="container">
    <div class="brand">
      <img src="assets/logo.png" alt="Aries logo">
      <span>Aries9419 八字報告</span>
    </div>
    <nav class="nav-links">
      <a href="admin.html" id="adminLink" class="btn secondary" style="width:auto;display:none">系統維護</a>
      <button onclick="handleLogout()">登出</button>
    </nav>
  </div>
</header>

<main class="app">
  <div class="container">

    <div class="card">
      <h2>請輸入個人資料，西元國曆出生年月日時</h2>
      <form id="baziForm">
        <div class="form-grid">
          <div class="field">
            <label for="f-name">姓名</label>
            <input type="text" id="f-name" placeholder="王小明" required>
          </div>
          <div class="field">
            <label for="f-gender">性別</label>
            <select id="f-gender">
              <option value="male">男</option>
              <option value="female">女</option>
            </select>
          </div>
          <div class="field">
            <label for="f-date">出生日期（國曆）</label>
            <input type="date" id="f-date" required>
          </div>
          <div class="field">
            <label for="f-time">出生時間</label>
            <input type="time" id="f-time" required>
          </div>
          <div class="field">
            <label for="f-qyear">擇日（人格解碼用）</label>
            <select id="f-qyear"></select>
          </div>
          <div class="field">
            <label for="f-qmonth">&nbsp;</label>
            <select id="f-qmonth"></select>
          </div>
          <div class="field">
            <label for="f-qday">&nbsp;</label>
            <select id="f-qday"></select>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn" id="baziSubmitBtn">產生八字報告</button>
          <button type="button" class="btn" id="rengeSubmitBtn">人格解碼報告</button>
          <button type="button" class="btn" id="lifenumSubmitBtn">生命靈數報告</button>
        </div>
        <p class="form-msg show info" id="permissionNote" style="display:none">您的帳號目前沒有任何報告的使用權限，請聯絡管理者開通。</p>
      </form>
    </div>

    <div class="tabs" id="reportTabs" data-html2canvas-ignore="true">
      <button class="tab-btn active" id="tabBazi">八字報告</button>
      <button class="tab-btn" id="tabRenge">人格解碼報告</button>
      <button class="tab-btn" id="tabLifenum">生命靈數報告</button>
    </div>

    <div id="printArea">
    <div id="baziTabPanel">
    <div class="card" id="resultCard" style="display:none">
      <div class="card-head" style="justify-content:flex-end">
        <button class="btn secondary" id="exportPdfBtn" style="width:auto" data-html2canvas-ignore="true">匯出 PDF</button>
      </div>

      <div class="info-panel" id="infoPanel"></div>

      <div class="pillars-wrap">
        <div class="pillars" id="pillarsGrid"></div>
      </div>

      <table class="note-table" id="noteTable">
        <tr><td>天干</td><td id="ganNote"></td></tr>
        <tr><td>地支</td><td id="zhiNote"></td></tr>
      </table>

      <div class="summary-grid">
        <div class="summary-box">
          <h3>五行強弱表</h3>
          <div class="box-body" id="wuxingBars"></div>
        </div>
        <div class="summary-box">
          <h3>十神比重表</h3>
          <div class="box-body shishen-grid" id="shishenGrid"></div>
        </div>
      </div>
    </div>

    <div class="card" id="dayunCard" style="display:none">
      <h2>大運與流年<span data-html2canvas-ignore="true">（點選欄位標題查看，由老到少排列）</span></h2>
      <div class="dayun-block">
        <p class="strip-label" style="margin-top:0">大運</p>
        <div class="dayun-wrap">
          <div id="dayunTable"></div>
        </div>
      </div>
      <div class="dayun-block">
        <p class="strip-label" id="liunianLabel">流年</p>
        <div class="dayun-wrap">
          <div id="liunianTable"></div>
        </div>
      </div>
    </div>
    </div>

    <div id="rengeTabPanel" style="display:none">
    <div class="card renge-card" id="rengeCard" style="display:none">
      <div class="card-head" style="justify-content:flex-end">
        <button class="btn secondary" id="exportRengePdfBtn" style="width:auto" data-html2canvas-ignore="true">匯出 PDF</button>
      </div>

      <div class="renge-info" id="rengeInfoPanel"></div>

      <div class="renge-number-boxes" id="rengeNumberBoxes"></div>

      <div class="renge-row-pair">
        <div class="renge-panel">
          <div class="renge-box-title">人生階段能量</div>
          <div id="rengeStageTable"></div>
        </div>
        <div class="renge-energy-row-wrap">
          <div class="renge-energy-row" id="rengeEnergyRow"></div>
        </div>
      </div>

      <div class="renge-row-pair" style="margin-top:16px">
        <div class="renge-panel">
          <div class="renge-box-title">九宮連線密碼</div>
          <div id="rengeCodeTable"></div>
        </div>
        <div class="renge-panel">
          <div class="renge-box-title">九宮能量圖</div>
          <div class="box-body">
            <div class="renge-energy-grid" id="rengeEnergyGrid"></div>
            <div class="renge-energy-legend">
              <span><span class="dot blue"></span>主命數</span>
              <span><span class="dot pink"></span>天賦數</span>
              <span><span class="dot green"></span>生日數</span>
              <span><span class="dot orange"></span>階段數</span>
              <span><span class="dot purple"></span>年數能量</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    </div>

    <div id="lifenumTabPanel" style="display:none">
    <div class="card lifenum-card" id="lifenumCard" style="display:none">
      <div class="card-head" style="justify-content:flex-end">
        <button class="btn secondary" id="exportLifenumPdfBtn" style="width:auto" data-html2canvas-ignore="true">匯出 PDF</button>
      </div>

      <div class="lifenum-top">
        <div class="lifenum-gridbox" id="lifenumGridBox"></div>
        <div class="lifenum-maintable" id="lifenumMainTable"></div>
      </div>

      <div class="lifenum-typebox" id="lifenumTypeBox"></div>

      <div class="lifenum-codelines" id="lifenumCodeLines"></div>

      <div class="lifenum-traitcard" id="lifenumTraitCard"></div>

      <div class="lifenum-lessoncard" id="lifenumLessonCard"></div>

      <div class="lifenum-starcard" id="lifenumStarCard"></div>

      <div class="lifenum-traitcard" id="lifenumOtherSideCard"></div>

      <div class="lifenum-traitcard" id="lifenumMostInfluentialCard"></div>

      <div class="lifenum-lessoncard" id="lifenumComplementCard"></div>

      <div class="lifenum-lessoncard" id="lifenumWuxingHealthCard"></div>
    </div>
    </div>
    </div>

  </div>
</main>

<footer>&copy; Aries. 僅供已核准學員使用。</footer>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js?v=22"></script>
<script src="js/auth.js?v=22"></script>
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.7.7/lunar.js"></script>
<script src="js/bazi-engine.js?v=22"></script>
<script src="js/renge-engine.js?v=22"></script>
<script src="js/lifenum-engine.js?v=22"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="js/app.js?v=22"></script>
</body>
</html>
