<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>系統維護 - Aries 八字分析</title>
<link rel="icon" href="assets/logo.png">
<link rel="stylesheet" href="css/style.css?v=128">
</head>
<body>

<header class="site-header">
  <div class="container">
    <div class="brand">
      <img src="assets/logo.png" alt="Aries logo">
      <span>Aries 系統維護</span>
    </div>
    <nav class="nav-links">
      <a href="index.html" class="btn secondary" style="width:auto">回報告首頁</a>
      <button onclick="handleLogout()">登出</button>
    </nav>
  </div>
</header>

<main class="app">
  <div class="container">

    <div class="card">
      <h2>帳號權限管理</h2>
      <p class="admin-hint">帳號＝信箱，密碼由使用者自訂。核准後，勾選下方報告／功能的權限即可開放使用；未勾選的項目該帳號登入後不會看到，點擊上方導覽按鍵會提示未開放。</p>
      <div class="field" style="max-width:320px">
        <label for="adminSearch">姓名查詢</label>
        <input type="text" id="adminSearch" placeholder="輸入姓名關鍵字篩選">
      </div>
      <div class="form-msg" id="adminMsg"></div>
      <div class="admin-table-wrap">
        <table class="admin-table" id="adminTable">
          <thead>
            <tr>
              <th>姓名</th>
              <th>Email</th>
              <th>狀態</th>
              <th>八字</th>
              <th>人格解碼</th>
              <th>生命靈數</th>
              <th>奇門命盤</th>
              <th>奇門遁甲</th>
              <th>觀音棋卦</th>
              <th>濟公棋卦</th>
              <th>數字易經</th>
              <th>名片風水</th>
              <th>申請時間</th>
            </tr>
          </thead>
          <tbody id="adminTableBody"></tbody>
        </table>
      </div>
    </div>

  </div>
</main>

<footer>&copy; Aries. 僅供已核准學員使用。</footer>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js?v=128"></script>
<script src="js/auth.js?v=128"></script>
<script src="js/admin.js?v=128"></script>
</body>
</html>
