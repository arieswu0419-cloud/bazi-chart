const tbody = document.querySelector("#result tbody");
let pass = 0, fails = [];
CASES.forEach((c, i) => {
  const [y, m, d, hh, mm, expDay, expTime, expXun, expJu, expFu, expShiDir, expPattern] = c;
  let row = { day: "?", time: "?", xun: "?", ju: "?", fu: "?", shi: "?", pat: "?" };
  try {
    const r = calculateQimenHongpan({ year: y, month: m, day: d, hour: hh, minute: mm });
    row.day = r.siZhu[1].gan.char + r.siZhu[1].zhi.char;
    row.time = r.siZhu[0].gan.char + r.siZhu[0].zhi.char;
    row.xun = r.xunShou.xun;
    row.ju = (r.juInfo.isYang ? "陽" : "陰") + r.juInfo.ju;
    row.fu = r.fuShouXing;
    row.shi = HP_GONG[r.menTargetGong].dir;
    row.pat = r.patternText;
  } catch (e) { row.pat = "ERROR: " + e.message; }
  const checks = [
    [row.day, expDay], [row.time, expTime], [row.xun, expXun], [row.ju, expJu],
    [row.fu, expFu], [row.shi, expShiDir], [row.pat, expPattern]
  ];
  const allOk = checks.every(([a, b]) => a === b);
  if (allOk) pass++; else fails.push(i + 1);
  const cell = (v, exp) => '<td class="' + (v === exp ? "ok" : "fail") + '">' + v + (v === exp ? "" : "（應為 " + exp + "）") + "</td>";
  tbody.insertAdjacentHTML("beforeend",
    "<tr><td>" + (i + 1) + "</td><td>" + y + "-" + m + "-" + d + " " + hh + ":" + String(mm).padStart(2, "0") + "</td>" +
    cell(row.day, expDay) + cell(row.time, expTime) + cell(row.xun, expXun) + cell(row.ju, expJu) +
    cell(row.fu, expFu) + cell(row.shi, expShiDir) + cell(row.pat, expPattern) + "</tr>");
});
// ---- 外環 64 卦驗證（截圖實讀 19 個卦位）----
const HEX_CASES = [
  [2026, 7,16,15,57, { 4:"小過", 9:"益", 2:"鼎", 3:"蒙", 7:"明夷", 8:"需", 1:"履", 6:"萃" }],
  [2026, 8,16,15,57, { 4:"未濟", 9:"謙", 2:"隨", 3:"小畜", 7:"姤", 8:"歸妹", 1:"剝", 6:"既濟" }],
  [2026,12,16,15,57, { 4:"蒙", 9:"小過", 2:"益" }]
];
let hexPass = 0, hexTotal = 0, hexFails = [];
HEX_CASES.forEach(([y, m, d, hh, mm, expected]) => {
  const r = calculateQimenHongpan({ year: y, month: m, day: d, hour: hh, minute: mm });
  Object.keys(expected).forEach((g) => {
    hexTotal++;
    const got = r.hexagrams[g] ? r.hexagrams[g].name : "?";
    if (got === expected[g]) hexPass++;
    else hexFails.push(y + "-" + m + "-" + d + " " + g + "宮:" + got + "(應為" + expected[g] + ")");
  });
});
// ---- 十二長生驗證（復科截圖實讀：丙/壬 陽干順行、乙/癸 陰干逆行 各 12 支全序列）----
const CS_CASES = {
  丙: "寅長卯沐辰冠巳臨午帝未衰申病酉死戌墓亥絕子胎丑養",
  壬: "申長酉沐戌冠亥臨子帝丑衰寅病卯死辰墓巳絕午胎未養",
  乙: "午長巳沐辰冠卯臨寅帝丑衰子病亥死戌墓酉絕申胎未養",
  癸: "卯長寅沐丑冠子臨亥帝戌衰酉病申死未墓午絕巳胎辰養"
};
let csPass = 0, csTotal = 0, csFails = [];
Object.keys(CS_CASES).forEach((gan) => {
  const map = hpChangShengMap(gan);
  for (let i = 0; i < 24; i += 2) {
    csTotal++;
    const zhi = CS_CASES[gan][i], exp = CS_CASES[gan][i + 1];
    if (map[zhi] === exp) csPass++;
    else csFails.push(gan + ":" + zhi + map[zhi] + "(應為" + exp + ")");
  }
});
document.getElementById("summary").textContent =
  "結果：" + pass + " / " + CASES.length + " 全欄通過" + (fails.length ? "；失敗案例 #" + fails.join(", #") : " ✅") +
  "｜64卦：" + hexPass + " / " + hexTotal + (hexFails.length ? "；" + hexFails.join("、") : " ✅") +
  "｜長生：" + csPass + " / " + csTotal + (csFails.length ? "；" + csFails.join("、") : " ✅");
window.__testSummary = { pass, total: CASES.length, fails, hexPass, hexTotal, hexFails, csPass, csTotal, csFails };
