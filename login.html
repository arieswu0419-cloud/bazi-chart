<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>登入 - Aries 八字分析</title>
<link rel="icon" href="assets/logo.png">
<link rel="stylesheet" href="css/style.css?v=14">
</head>
<body>

<header class="site-header">
  <div class="container">
    <div class="brand">
      <img src="assets/logo.png" alt="Aries logo">
      <span>Aries 八字分析</span>
    </div>
  </div>
</header>

<div class="auth-wrap">
  <div class="auth-card">
    <h1>學員登入</h1>
    <div class="form-msg" id="li-msg"></div>
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="field">
        <label for="li-email">Email</label>
        <input type="email" id="li-email" required>
      </div>
      <div class="field">
        <label for="li-password">密碼</label>
        <input type="password" id="li-password" required>
      </div>
      <button type="submit" class="btn">登入</button>
    </form>
    <p class="auth-switch">還沒有帳號？<a href="signup.html">申請帳號</a></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js?v=14"></script>
<script src="js/auth.js?v=14"></script>
</body>
</html>
